spring:
  application:
    name: nour-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nour_db}
    username: ${DATABASE_USERNAME:nour_user}
    password: ${DATABASE_PASSWORD:change_me_in_production}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # flyway handles migrations
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: always
  forward-headers-strategy: framework

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_SECRET_KEY_MINIMUM_256_BITS_FOR_HS256}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}
  refresh-expiry-days: 30

# AWS S3 / MinIO
storage:
  type: ${STORAGE_TYPE:minio}             # 'aws' or 'minio'
  bucket: ${S3_BUCKET:nour-content}
  region: ${S3_REGION:us-east-1}
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}

# Firebase FCM
firebase:
  credentials-file: ${FIREBASE_CREDENTIALS_FILE:firebase-credentials.json}
  enabled: ${FIREBASE_ENABLED:false}

# Pagination defaults
pagination:
  default-page-size: 20
  max-page-size: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha

---
# Test profile
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: test_secret_key_minimum_256_bits_long_for_hs256_algorithm_testing
  expiry-hours: 1
